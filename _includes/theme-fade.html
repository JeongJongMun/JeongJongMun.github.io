<!-- Fade every color change when the theme flips (styles in _sass/base/_theme-fade.scss) -->
<script>
  /* NOTE: `compress_html` collapses this script onto a single line in
     production, so line comments would swallow the rest of the code.
     Use block comments only in here. */
  (() => {
    const html = document.documentElement;
    let timer = null;
    let viewTransitionActive = false;

    /* Fallback: uniform per-element transition via a temporary class. */
    const fade = () => {
      if (viewTransitionActive) {
        return;
      }

      html.classList.add('theme-fading');
      clearTimeout(timer);
      timer = setTimeout(() => html.classList.remove('theme-fading'), 250);
    };

    /* Preferred path: wrap Theme.flip in a view transition. The browser
       cross-fades one GPU snapshot of the whole page, so the duration is
       constant regardless of how heavy the page is, and gradients, filters
       and images are all included. The toggle button calls Theme.flip()
       lazily, so patching the global here is enough. */
    if (window.Theme && document.startViewTransition && !matchMedia('(prefers-reduced-motion: reduce)').matches) {
      const original = Theme.flip.bind(Theme);

      Theme.flip = () => {
        viewTransitionActive = true;

        /* Suppress per-element transitions (e.g. the post-preview hover
           transition) while the snapshot cross-fade runs, so every element
           lands at exactly the same speed. */
        html.classList.add('theme-snapping');
        const vt = document.startViewTransition(original);
        vt.finished.finally(() => {
          html.classList.remove('theme-snapping');
          viewTransitionActive = false;
        });
      };
    }

    /* Attribute flip without Theme.flip (e.g. other scripts). */
    new MutationObserver(fade).observe(html, {
      attributes: true,
      attributeFilter: ['data-mode']
    });

    /* Following the OS (no data-mode attribute): the media query flips
       without any attribute change. */
    matchMedia('(prefers-color-scheme: dark)').addEventListener('change', fade);
  })();
</script>
